name: Scheduled Live Market Scraper

on:
  schedule:
    # Runs every 15 minutes. (Be prepared for GitHub to randomly delay this)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Keeps your manual trigger button alive

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix the Node.js 20 deprecation warning
      - name: Checkout Code
        uses: actions/checkout@v4

      # Updated to v5 to fix the Node.js 20 deprecation warning
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Live Scraper Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # Forces the Ubuntu runner into Iran Standard Time
          TZ: "Asia/Tehran" 
        run: python src/bot.py